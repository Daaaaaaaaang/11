<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="출퇴근">
<meta name="theme-color" content="#f5f4f0">
<title>출퇴근 기록</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #f2f1ed;
    --surface: #ffffff;
    --text: #111;
    --muted: #999;
    --border: #e5e2da;
    --accent-in:  #2563eb;
    --accent-out: #dc2626;
    --accent-fuel: #d97706;
    --tag: #ece9e3;
    --sh: 0 1px 12px rgba(0,0,0,0.08);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  html { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', -apple-system, 'Noto Sans KR', sans-serif;
    min-height: 100%;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  /* ── Layout ── */
  .app {
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: calc(80px + var(--safe-bot));
  }

  /* ── Top bar ── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: calc(16px + var(--safe-top)) 20px 14px;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-inner { display:flex; justify-content:space-between; align-items:center; }
  .app-title { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .today-date { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .gps-chip {
    display:flex; align-items:center; gap:6px;
    background: var(--tag); border-radius: 100px;
    padding: 8px 14px; font-size: 12px; font-weight: 600; color: var(--muted);
    min-height: 36px;
  }
  .gps-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); transition:all .3s; flex-shrink:0; }
  .gps-dot.on { background:#16a34a; box-shadow:0 0 7px #16a34a; animation:blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:.35} }

  /* ── Content ── */
  .content { padding: 16px 14px 0; display:flex; flex-direction:column; gap:12px; }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border-radius: 20px;
    padding: 20px;
    box-shadow: var(--sh);
  }
  .card-label {
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase; margin-bottom: 14px;
  }

  /* ── Today time boxes ── */
  .time-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  .time-box { background:var(--tag); border-radius:14px; padding:16px 12px; text-align:center; }
  .tb-label { font-size:11px; font-weight:700; color:var(--muted); letter-spacing:1px; margin-bottom:8px; }
  .tb-value { font-family:'Space Mono',monospace; font-size:24px; font-weight:700; letter-spacing:-1px; line-height:1; }
  .tb-value.in  { color:var(--accent-in); }
  .tb-value.out { color:var(--accent-out); }
  .tb-empty { color:var(--muted); font-size:14px; font-weight:500; font-family:'Pretendard',sans-serif; }

  .work-row {
    display:flex; justify-content:space-between; align-items:center;
    padding-top: 12px; border-top: 1px solid var(--border);
    font-size:14px; color:var(--muted);
  }
  .work-val { font-family:'Space Mono',monospace; font-weight:700; color:var(--text); font-size:15px; }

  /* ── Distance + Fuel row ── */
  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .mini-card { background:var(--surface); border-radius:18px; padding:18px 16px; box-shadow:var(--sh); }
  .mc-label { font-size:11px; font-weight:700; color:var(--muted); letter-spacing:1px; margin-bottom:8px; }
  .mc-value { font-family:'Space Mono',monospace; font-size:26px; font-weight:700; color:var(--text); line-height:1; }
  .mc-unit  { font-size:12px; color:var(--muted); margin-top:4px; }

  .live-pill {
    display:none; align-items:center; gap:4px;
    background:#f0fdf4; border:1px solid #bbf7d0; color:#16a34a;
    border-radius:100px; padding:4px 9px; font-size:10px; font-weight:700;
    margin-top:8px; width:fit-content;
  }
  .live-pill.show { display:flex; }
  .live-dot { width:5px; height:5px; border-radius:50%; background:#16a34a; animation:blink 1s infinite; }

  /* ── Fuel settings ── */
  .fuel-inputs { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
  .input-group { display:flex; flex-direction:column; gap:6px; }
  .input-group label { font-size:12px; font-weight:600; color:var(--muted); }
  .input-group input {
    background:var(--tag); border:2px solid var(--border); border-radius:12px;
    padding:13px 14px; font-family:'Space Mono',monospace; font-size:18px;
    font-weight:700; color:var(--text); outline:none; width:100%;
    transition:border-color .15s; min-height:52px;
  }
  .input-group input:focus { border-color:var(--accent-fuel); }

  .fuel-result {
    margin-top:14px; background:#fffbeb;
    border:1px solid #fde68a; border-radius:14px; overflow:hidden;
  }
  .fr-row {
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 16px; font-size:14px; color:#92400e;
    border-bottom:1px solid #fde68a;
  }
  .fr-row:last-child { border-bottom:none; }
  .fr-val { font-family:'Space Mono',monospace; font-weight:700; color:#78350f; font-size:15px; }

  /* ── Stats ── */
  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .stat-box { background:var(--surface); border-radius:16px; padding:18px 16px; box-shadow:var(--sh); }
  .stat-label { font-size:11px; font-weight:700; color:var(--muted); letter-spacing:1px; margin-bottom:8px; }
  .stat-value { font-family:'Space Mono',monospace; font-size:22px; font-weight:700; color:var(--text); }
  .stat-sub { font-size:12px; color:var(--muted); margin-top:3px; }

  /* ── Action buttons ── */
  .btn-main {
    width:100%; padding:20px; border:none; border-radius:18px;
    font-size:18px; font-weight:700; cursor:pointer;
    transition:all .15s; letter-spacing:-.3px;
    min-height:60px; display:flex; align-items:center; justify-content:center; gap:8px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-in  { background:var(--accent-in);  color:#fff; box-shadow:0 4px 20px rgba(37,99,235,.3); }
  .btn-out { background:var(--accent-out); color:#fff; box-shadow:0 4px 20px rgba(220,38,38,.25); }
  .btn-main:active { transform:scale(.97); opacity:.9; }

  .btn-reset {
    width:100%; padding:16px; border:2px solid var(--border);
    background:transparent; border-radius:14px; font-size:15px;
    font-weight:600; color:var(--muted); cursor:pointer; margin-top:8px;
    min-height:52px;
  }
  .btn-reset:active { background:var(--tag); }

  /* ── History ── */
  .month-tabs { display:flex; gap:6px; }
  .month-tab {
    font-size:12px; font-weight:700; padding:6px 14px;
    border-radius:100px; cursor:pointer; border:none;
    background:var(--tag); color:var(--muted); transition:all .15s;
    min-height:34px; display:flex; align-items:center;
  }
  .month-tab.active { background:var(--text); color:#fff; }

  .hist-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }

  .history-item {
    display:flex; align-items:center; gap:12px;
    padding:14px 0; border-bottom:1px solid var(--border);
  }
  .history-item:last-child { border-bottom:none; padding-bottom:0; }

  .h-date { min-width:40px; text-align:center; }
  .h-weekday { font-size:11px; font-weight:600; color:var(--muted); margin-bottom:2px; }
  .h-day { font-family:'Space Mono',monospace; font-size:22px; font-weight:700; color:var(--text); line-height:1; }

  .h-mid { flex:1; }
  .h-time-row { display:flex; align-items:center; gap:7px; }
  .h-time-row + .h-time-row { margin-top:5px; }
  .h-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:5px; flex-shrink:0; }
  .h-badge.in  { background:#dbeafe; color:var(--accent-in); }
  .h-badge.out { background:#fee2e2; color:var(--accent-out); }
  .h-tval { font-family:'Space Mono',monospace; font-size:14px; font-weight:700; color:var(--text); }
  .h-dur { font-size:12px; color:var(--muted); margin-top:5px; }

  .h-right { text-align:right; flex-shrink:0; }
  .h-dist { font-family:'Space Mono',monospace; font-size:15px; font-weight:700; color:var(--text); }
  .h-fuel { font-size:12px; color:var(--accent-fuel); font-weight:600; margin-top:3px; }

  .empty-state { text-align:center; padding:36px 0; color:var(--muted); line-height:2; }
  .empty-icon  { font-size:40px; display:block; margin-bottom:8px; }

  /* ── Install banner ── */
  .install-banner {
    background: linear-gradient(135deg, #1e40af, #2563eb);
    border-radius: 18px; padding: 18px 20px;
    display: flex; align-items: center; justify-content: space-between; gap:12px;
    box-shadow: 0 4px 20px rgba(37,99,235,.3);
  }
  .install-text { color:#fff; }
  .install-title { font-size:15px; font-weight:700; margin-bottom:3px; }
  .install-desc  { font-size:12px; opacity:.8; line-height:1.4; }
  .install-btn {
    background:#fff; color:var(--accent-in); border:none;
    border-radius:12px; padding:10px 16px; font-size:13px;
    font-weight:700; cursor:pointer; flex-shrink:0; white-space:nowrap;
  }
  .install-close {
    background:rgba(255,255,255,.2); border:none; color:#fff;
    border-radius:8px; padding:6px 10px; font-size:16px; cursor:pointer; flex-shrink:0;
  }

  /* ── Toast ── */
  .toast {
    position:fixed; bottom:calc(24px + var(--safe-bot)); left:50%;
    transform:translateX(-50%) translateY(100px);
    background:#111; color:#fff; border-radius:100px;
    padding:14px 26px; font-size:15px; font-weight:600;
    transition:transform .35s cubic-bezier(.34,1.56,.64,1);
    z-index:300; white-space:nowrap; pointer-events:none;
    box-shadow:0 4px 20px rgba(0,0,0,.25);
  }
  .toast.show { transform:translateX(-50%) translateY(0); }

  /* ── Scrollbar hide ── */
  ::-webkit-scrollbar { display:none; }
</style>
</head>
<body>
<div class="app">

  <!-- 상단 바 -->
  <div class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="app-title">🚗 출퇴근 기록</div>
        <div class="today-date" id="todayDate"></div>
      </div>
      <div class="gps-chip">
        <div class="gps-dot" id="gpsDot"></div>
        <span id="gpsText">GPS</span>
      </div>
    </div>
  </div>

  <div class="content">

    <!-- 설치 배너 (PWA) -->
    <div class="install-banner" id="installBanner" style="display:none;">
      <div class="install-text">
        <div class="install-title">📱 앱으로 설치하기</div>
        <div class="install-desc">홈 화면에 추가하면<br>앱처럼 사용할 수 있어요</div>
      </div>
      <button class="install-btn" id="installBtn">설치</button>
      <button class="install-close" onclick="closeBanner()">✕</button>
    </div>

    <!-- 오늘 출퇴근 -->
    <div class="card">
      <div class="card-label">오늘</div>
      <div class="time-grid">
        <div class="time-box">
          <div class="tb-label">출근</div>
          <div class="tb-value in" id="inTimeDisplay"><span class="tb-empty">미기록</span></div>
        </div>
        <div class="time-box">
          <div class="tb-label">퇴근</div>
          <div class="tb-value out" id="outTimeDisplay"><span class="tb-empty">미기록</span></div>
        </div>
      </div>
      <div class="work-row">
        <span>근무 시간</span>
        <span class="work-val" id="workDuration">—</span>
      </div>
    </div>

    <!-- 거리 + 연료비 -->
    <div class="two-col">
      <div class="mini-card">
        <div class="mc-label">이동 거리</div>
        <div class="mc-value" id="distVal">0.00</div>
        <div class="mc-unit">km (편도)</div>
        <div class="live-pill" id="livePill"><div class="live-dot"></div>LIVE</div>
      </div>
      <div class="mini-card">
        <div class="mc-label">오늘 연료비</div>
        <div class="mc-value" id="todayFuelCost">—</div>
        <div class="mc-unit">원 (왕복)</div>
      </div>
    </div>

    <!-- 연비 설정 -->
    <div class="card">
      <div class="card-label">⛽ 연비 설정</div>
      <div class="fuel-inputs">
        <div class="input-group">
          <label>연비 (km/L)</label>
          <input type="number" id="fuelEfficiency" value="12" min="1" max="99" step="0.1"
                 inputmode="decimal" oninput="saveFuelSettings(); updateFuel()">
        </div>
        <div class="input-group">
          <label>유가 (원/L)</label>
          <input type="number" id="fuelPrice" value="1700" min="100" max="9999" step="10"
                 inputmode="numeric" oninput="saveFuelSettings(); updateFuel()">
        </div>
      </div>
      <div class="fuel-result" id="fuelResult" style="display:none;">
        <div class="fr-row"><span>편도 거리</span><span class="fr-val" id="frOneway">—</span></div>
        <div class="fr-row"><span>왕복 거리</span><span class="fr-val" id="frRoundtrip">—</span></div>
        <div class="fr-row"><span>사용 연료</span><span class="fr-val" id="frLiters">—</span></div>
        <div class="fr-row"><span>왕복 연료비</span><span class="fr-val" id="frCost">—</span></div>
      </div>
    </div>

    <!-- 이번 주 통계 -->
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-label">이번 주 출근</div>
        <div class="stat-value" id="weekDays">0</div>
        <div class="stat-sub">일</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">이달 연료비</div>
        <div class="stat-value" id="monthFuel">—</div>
        <div class="stat-sub">원 (누적)</div>
      </div>
    </div>

    <!-- 버튼 -->
    <div>
      <button class="btn-main btn-in"  id="checkInBtn"  onclick="checkIn()">🏢 출근 체크인</button>
      <button class="btn-main btn-out" id="checkOutBtn" onclick="checkOut()" style="display:none;">🏠 퇴근 체크아웃</button>
      <button class="btn-reset" onclick="resetToday()">오늘 기록 초기화</button>
    </div>

    <!-- 기록 -->
    <div class="card">
      <div class="hist-header">
        <div class="card-label" style="margin:0;">기록</div>
        <div class="month-tabs" id="monthTabs"></div>
      </div>
      <div id="historyList"></div>
    </div>

  </div><!-- /content -->
</div><!-- /app -->

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
//  PWA — Service Worker & Install
// ══════════════════════════════════════════
const SW_SRC = `
const CACHE = 'commute-v1';
const FILES = [self.location.href];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(FILES)));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match(e.request)))
  );
});
`;

if ('serviceWorker' in navigator) {
  const blob = new Blob([SW_SRC], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// PWA manifest injection
const manifest = {
  name: '출퇴근 기록',
  short_name: '출퇴근',
  start_url: './',
  display: 'standalone',
  background_color: '#f2f1ed',
  theme_color: '#f2f1ed',
  orientation: 'portrait',
  icons: [
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232563eb'/><text y='.9em' font-size='72' x='12'>🚗</text></svg>", sizes: '192x192', type: 'image/svg+xml' },
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232563eb'/><text y='.9em' font-size='72' x='12'>🚗</text></svg>", sizes: '512x512', type: 'image/svg+xml' }
  ]
};
const mBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
const mUrl  = URL.createObjectURL(mBlob);
const mLink = document.createElement('link');
mLink.rel = 'manifest'; mLink.href = mUrl;
document.head.appendChild(mLink);

// Install prompt
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('installDismissed')) {
    document.getElementById('installBanner').style.display = 'flex';
  }
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') closeBanner();
  deferredPrompt = null;
});
function closeBanner() {
  document.getElementById('installBanner').style.display = 'none';
  localStorage.setItem('installDismissed', '1');
}

// ══════════════════════════════════════════
//  App State
// ══════════════════════════════════════════
let today       = {};
let history     = JSON.parse(localStorage.getItem('commuteHistory') || '[]');
let watchId     = null;
let startPos    = null;
let currentDist = 0;
let currentMonth = new Date().getMonth();

const todayKey = () => new Date().toISOString().slice(0, 10);

// ── Fuel ──────────────────────────────────
function loadFuelSettings() {
  const s = JSON.parse(localStorage.getItem('fuelSettings') || '{}');
  if (s.efficiency) document.getElementById('fuelEfficiency').value = s.efficiency;
  if (s.price)      document.getElementById('fuelPrice').value      = s.price;
}
function saveFuelSettings() {
  localStorage.setItem('fuelSettings', JSON.stringify({
    efficiency: document.getElementById('fuelEfficiency').value,
    price:      document.getElementById('fuelPrice').value,
  }));
}
function getFuel() {
  return {
    eff:   parseFloat(document.getElementById('fuelEfficiency').value) || 12,
    price: parseFloat(document.getElementById('fuelPrice').value)      || 1700,
  };
}
function calcCost(km) {
  const { eff, price } = getFuel();
  return Math.round((km * 2 / eff) * price);
}
function updateFuel() {
  const dist = currentDist > 0 ? currentDist : (today.distance || 0);
  const el   = document.getElementById('fuelResult');
  if (dist < 0.01) {
    el.style.display = 'none';
    document.getElementById('todayFuelCost').textContent = '—';
    updateMonthFuel(); return;
  }
  const { eff, price } = getFuel();
  const rt     = dist * 2;
  const liters = rt / eff;
  const cost   = Math.round(liters * price);
  document.getElementById('frOneway').textContent    = dist.toFixed(2) + ' km';
  document.getElementById('frRoundtrip').textContent = rt.toFixed(2)   + ' km';
  document.getElementById('frLiters').textContent    = liters.toFixed(2) + ' L';
  document.getElementById('frCost').textContent      = cost.toLocaleString() + ' 원';
  el.style.display = 'block';
  document.getElementById('todayFuelCost').textContent = cost.toLocaleString();
  updateMonthFuel();
}
function updateMonthFuel() {
  const m = new Date().getMonth();
  const recs = history.filter(h => new Date(h.date).getMonth() === m && h.distance);
  document.getElementById('monthFuel').textContent =
    recs.length ? recs.reduce((s,h) => s + calcCost(h.distance), 0).toLocaleString() : '—';
}

// ── GPS ───────────────────────────────────
function haversine(la1,lo1,la2,lo2) {
  const R=6371, dLa=(la2-la1)*Math.PI/180, dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function startGPS() {
  if (!navigator.geolocation) return;
  currentDist = 0; startPos = null;
  document.getElementById('gpsDot').classList.add('on');
  document.getElementById('gpsText').textContent = '추적중';
  document.getElementById('livePill').classList.add('show');
  watchId = navigator.geolocation.watchPosition(pos => {
    const { latitude:la, longitude:lo, accuracy:ac } = pos.coords;
    if (ac > 50) return;
    if (!startPos) { startPos={la,lo}; return; }
    const d = haversine(startPos.la, startPos.lo, la, lo);
    if (d > 0.005) {
      currentDist += d;
      document.getElementById('distVal').textContent = currentDist.toFixed(2);
      startPos = {la,lo};
      updateFuel();
    }
  }, () => { document.getElementById('gpsText').textContent = 'GPS 오류'; },
  { enableHighAccuracy:true, maximumAge:0, timeout:15000 });
}
function stopGPS() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId=null; }
  document.getElementById('gpsDot').classList.remove('on');
  document.getElementById('gpsText').textContent = 'GPS';
  document.getElementById('livePill').classList.remove('show');
}

// ── Check in / out ────────────────────────
function checkIn() {
  today.date   = todayKey();
  today.inTime = new Date().toTimeString().slice(0,5);
  currentDist  = 0;
  document.getElementById('distVal').textContent = '0.00';
  document.getElementById('fuelResult').style.display = 'none';
  document.getElementById('todayFuelCost').textContent = '—';
  saveToday(); renderToday(); startGPS();
  showToast('🏢 출근 기록 완료!');
}
function checkOut() {
  today.outTime  = new Date().toTimeString().slice(0,5);
  today.distance = parseFloat(currentDist.toFixed(2));
  saveToday(); stopGPS();
  const idx = history.findIndex(h => h.date === today.date);
  if (idx>=0) history[idx]={...today}; else history.unshift({...today});
  saveHistory();
  renderToday(); renderStats(); renderHistory(); updateFuel();
  showToast('🏠 퇴근 기록 완료!');
}
function resetToday() {
  if (!confirm('오늘 기록을 초기화할까요?')) return;
  today = { date: todayKey() };
  currentDist = 0;
  document.getElementById('distVal').textContent = '0.00';
  document.getElementById('fuelResult').style.display = 'none';
  document.getElementById('todayFuelCost').textContent = '—';
  stopGPS(); saveToday(); renderToday();
  showToast('초기화 완료');
}

// ── Render ────────────────────────────────
function renderToday() {
  const inEl  = document.getElementById('inTimeDisplay');
  const outEl = document.getElementById('outTimeDisplay');
  const inBtn  = document.getElementById('checkInBtn');
  const outBtn = document.getElementById('checkOutBtn');

  if (today.inTime) {
    inEl.textContent = today.inTime; inEl.className = 'tb-value in';
    inBtn.style.display = 'none'; outBtn.style.display = 'flex';
  } else {
    inEl.innerHTML = '<span class="tb-empty">미기록</span>'; inEl.className = 'tb-value';
    inBtn.style.display = 'flex'; outBtn.style.display = 'none';
  }
  if (today.outTime) {
    outEl.textContent = today.outTime; outEl.className = 'tb-value out';
    outBtn.style.display = 'none'; inBtn.style.display = 'flex';
  } else {
    outEl.innerHTML = '<span class="tb-empty">미기록</span>'; outEl.className = 'tb-value';
  }

  const dur = document.getElementById('workDuration');
  if (today.inTime && today.outTime) {
    const [ih,im] = today.inTime.split(':').map(Number);
    const [oh,om] = today.outTime.split(':').map(Number);
    const mins = (oh*60+om)-(ih*60+im);
    dur.textContent = `${Math.floor(mins/60)}시간 ${mins%60}분`;
  } else { dur.textContent = '—'; }

  if (today.distance) {
    document.getElementById('distVal').textContent = today.distance.toFixed(2);
    updateFuel();
  }
}

function renderStats() {
  const now = new Date();
  const ws  = new Date(now);
  ws.setDate(now.getDate()-now.getDay()+1); ws.setHours(0,0,0,0);
  document.getElementById('weekDays').textContent = history.filter(h=>new Date(h.date)>=ws).length;
  updateMonthFuel();
}

function renderMonthTabs() {
  const months = [...new Set(history.map(h=>new Date(h.date).getMonth()))];
  if (!months.includes(new Date().getMonth())) months.unshift(new Date().getMonth());
  months.sort((a,b)=>b-a);
  document.getElementById('monthTabs').innerHTML = months.slice(0,3).map(m =>
    `<button class="month-tab ${m===currentMonth?'active':''}" onclick="switchMonth(${m})">${m+1}월</button>`
  ).join('');
}
function switchMonth(m) { currentMonth=m; renderMonthTabs(); renderHistory(); }

function renderHistory() {
  const el = document.getElementById('historyList');
  const filtered = history.filter(h=>new Date(h.date).getMonth()===currentMonth);
  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state"><span class="empty-icon">📭</span>이 달의 기록이 없습니다</div>`;
    return;
  }
  const dn = ['일','월','화','수','목','금','토'];
  el.innerHTML = filtered.map(h => {
    const d = new Date(h.date);
    let dur = '—';
    if (h.inTime && h.outTime) {
      const [ih,im]=h.inTime.split(':').map(Number), [oh,om]=h.outTime.split(':').map(Number);
      const m=(oh*60+om)-(ih*60+im);
      dur = `${Math.floor(m/60)}h ${m%60}m`;
    }
    return `
      <div class="history-item">
        <div class="h-date">
          <div class="h-weekday">${dn[d.getDay()]}</div>
          <div class="h-day">${d.getDate()}</div>
        </div>
        <div class="h-mid">
          <div class="h-time-row"><span class="h-badge in">출근</span><span class="h-tval">${h.inTime||'—'}</span></div>
          <div class="h-time-row"><span class="h-badge out">퇴근</span><span class="h-tval">${h.outTime||'—'}</span></div>
          <div class="h-dur">${dur}</div>
        </div>
        <div class="h-right">
          <div class="h-dist">${h.distance?h.distance.toFixed(2)+' km':'—'}</div>
          <div class="h-fuel">${h.distance?'⛽ '+calcCost(h.distance).toLocaleString()+'원':''}</div>
        </div>
      </div>`;
  }).join('');
}

function saveToday()   { localStorage.setItem('commuteToday',   JSON.stringify(today)); }
function saveHistory() { localStorage.setItem('commuteHistory', JSON.stringify(history)); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Init ──────────────────────────────────
function init() {
  document.getElementById('todayDate').textContent =
    new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric',weekday:'short'});

  loadFuelSettings();

  const saved = localStorage.getItem('commuteToday');
  if (saved) {
    const p = JSON.parse(saved);
    if (p.date === todayKey()) {
      today = p;
      // GPS 재시작 (출근 후 앱 재진입)
      if (p.inTime && !p.outTime) startGPS();
    } else {
      if (p.inTime && !history.find(h=>h.date===p.date)) { history.unshift(p); saveHistory(); }
      today = { date: todayKey() }; saveToday();
    }
  } else { today = { date: todayKey() }; }

  renderToday(); renderStats(); renderMonthTabs(); renderHistory();
}

init();
</script>
