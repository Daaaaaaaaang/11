<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="출퇴근">
<meta name="theme-color" content="#f2f1ed">
<title>출퇴근 기록</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<!-- 네이버 지도: 로드 완료 후 initApp() 호출 -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  :root {
    --bg:#f2f1ed; --surface:#fff; --text:#111; --muted:#999;
    --border:#e5e2da; --in:#2563eb; --out:#dc2626; --fuel:#d97706;
    --green:#16a34a; --tag:#ece9e3; --sh:0 2px 16px rgba(0,0,0,.07);
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bot:env(safe-area-inset-bottom,0px);
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{height:100%}
  body{background:var(--bg);color:var(--text);font-family:'Pretendard',-apple-system,'Noto Sans KR',sans-serif;min-height:100%;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
  .app{max-width:480px;margin:0 auto;padding-bottom:calc(60px + var(--safe-bot))}

  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:calc(12px + var(--safe-top)) 16px 12px;position:sticky;top:0;z-index:200}
  .topbar-inner{display:flex;justify-content:space-between;align-items:center}
  .app-title{font-size:19px;font-weight:800;letter-spacing:-.5px}
  .today-date{font-size:12px;color:var(--muted);margin-top:2px}
  .gps-chip{display:flex;align-items:center;gap:6px;background:var(--tag);border-radius:100px;padding:8px 14px;font-size:12px;font-weight:700;color:var(--muted);min-height:38px;border:none;cursor:pointer}
  .gps-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:all .3s;flex-shrink:0}
  .gps-dot.on{background:var(--green);box-shadow:0 0 7px var(--green);animation:blink 1.5s infinite}
  .gps-dot.err{background:var(--out)}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

  .content{padding:12px 12px 0;display:flex;flex-direction:column;gap:10px}

  .map-card{background:var(--surface);border-radius:22px;overflow:hidden;box-shadow:var(--sh);position:relative}
  #map{width:100%;height:250px}
  .map-overlay{position:absolute;top:10px;right:10px;z-index:100;display:flex;flex-direction:column;gap:6px}
  .map-btn{background:var(--surface);border:none;border-radius:10px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.18)}
  .map-btn:active{background:var(--tag)}
  .map-info-bar{background:var(--surface);border-top:1px solid var(--border);padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
  .map-info-item{display:flex;flex-direction:column;align-items:center;gap:2px}
  .map-info-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
  .map-info-val{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:var(--text)}
  .map-info-val.live{color:var(--green)}
  .map-sep{width:1px;height:28px;background:var(--border)}

  .card{background:var(--surface);border-radius:22px;padding:18px;box-shadow:var(--sh)}
  .card-label{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:14px}

  .time-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .time-box{background:var(--tag);border-radius:16px;padding:14px 12px;text-align:center}
  .tb-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:6px}
  .tb-value{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;letter-spacing:-1px;line-height:1;color:var(--text)}
  .tb-value.in{color:var(--in)} .tb-value.out{color:var(--out)}
  .tb-empty{color:var(--muted);font-size:14px;font-weight:500;font-family:'Pretendard',sans-serif}
  .work-row{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--border);font-size:14px;color:var(--muted)}
  .work-val{font-family:'Space Mono',monospace;font-weight:700;color:var(--text);font-size:15px}

  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .mini-card{background:var(--surface);border-radius:18px;padding:16px;box-shadow:var(--sh)}
  .mc-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:6px}
  .mc-value{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;color:var(--text);line-height:1}
  .mc-unit{font-size:11px;color:var(--muted);margin-top:4px}

  .fuel-inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .input-group{display:flex;flex-direction:column;gap:5px}
  .input-group label{font-size:12px;font-weight:600;color:var(--muted)}
  .input-group input{background:var(--tag);border:2px solid var(--border);border-radius:12px;padding:12px 14px;font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--text);outline:none;width:100%;transition:border-color .15s;min-height:50px}
  .input-group input:focus{border-color:var(--fuel)}
  .fuel-result{margin-top:12px;background:#fffbeb;border:1px solid #fde68a;border-radius:14px;overflow:hidden}
  .fr-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;font-size:13px;color:#92400e;border-bottom:1px solid #fde68a}
  .fr-row:last-child{border-bottom:none}
  .fr-val{font-family:'Space Mono',monospace;font-weight:700;color:#78350f;font-size:14px}

  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat-box{background:var(--surface);border-radius:16px;padding:16px;box-shadow:var(--sh)}
  .stat-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:6px}
  .stat-value{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--text)}
  .stat-sub{font-size:11px;color:var(--muted);margin-top:2px}

  .btn-main{width:100%;padding:18px;border:none;border-radius:18px;font-size:17px;font-weight:700;cursor:pointer;transition:all .15s;min-height:60px;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-in{background:var(--in);color:#fff;box-shadow:0 4px 20px rgba(37,99,235,.28)}
  .btn-out{background:var(--out);color:#fff;box-shadow:0 4px 20px rgba(220,38,38,.22)}
  .btn-main:active{transform:scale(.97);opacity:.9}
  .btn-reset{width:100%;padding:14px;border:2px solid var(--border);background:transparent;border-radius:14px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;margin-top:8px;min-height:50px}
  .btn-reset:active{background:var(--tag)}

  .hist-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .month-tabs{display:flex;gap:6px}
  .month-tab{font-size:12px;font-weight:700;padding:6px 12px;border-radius:100px;cursor:pointer;border:none;background:var(--tag);color:var(--muted);min-height:32px;display:flex;align-items:center;transition:all .15s}
  .month-tab.active{background:var(--text);color:#fff}
  .history-item{display:flex;align-items:center;gap:10px;padding:13px 0;border-bottom:1px solid var(--border)}
  .history-item:last-child{border-bottom:none;padding-bottom:0}
  .h-date{min-width:38px;text-align:center}
  .h-weekday{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:2px}
  .h-day{font-family:'Space Mono',monospace;font-size:21px;font-weight:700;color:var(--text);line-height:1}
  .h-mid{flex:1}
  .h-time-row{display:flex;align-items:center;gap:6px}
  .h-time-row+.h-time-row{margin-top:4px}
  .h-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;flex-shrink:0}
  .h-badge.in{background:#dbeafe;color:var(--in)} .h-badge.out{background:#fee2e2;color:var(--out)}
  .h-tval{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--text)}
  .h-dur{font-size:11px;color:var(--muted);margin-top:4px}
  .h-right{text-align:right;flex-shrink:0}
  .h-dist{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--text)}
  .h-fuel{font-size:11px;color:var(--fuel);font-weight:600;margin-top:3px}
  .empty-state{text-align:center;padding:32px 0;color:var(--muted);line-height:2}
  .empty-icon{font-size:38px;display:block;margin-bottom:8px}

  .toast{position:fixed;bottom:calc(20px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(100px);background:#111;color:#fff;border-radius:100px;padding:13px 24px;font-size:14px;font-weight:600;transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:500;white-space:nowrap;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.2)}
  .toast.show{transform:translateX(-50%) translateY(0)}
  ::-webkit-scrollbar{display:none}
  .leaflet-control-zoom{border:none!important;box-shadow:0 2px 8px rgba(0,0,0,.15)!important;border-radius:10px!important}
  .leaflet-control-zoom a{border:none!important;width:36px!important;height:36px!important;line-height:36px!important;font-size:18px!important}
  .leaflet-control-zoom-in{border-radius:10px 10px 0 0!important}
  .leaflet-control-zoom-out{border-radius:0 0 10px 10px!important}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="app-title">🚗 출퇴근 기록</div>
        <div class="today-date" id="todayDate"></div>
      </div>
      <button class="gps-chip" onclick="retryGPS()">
        <div class="gps-dot" id="gpsDot"></div>
        <span id="gpsText">지도 로딩중</span>
      </button>
    </div>
  </div>

  <div class="content">

    <div class="map-card">
      <div id="map"></div>
      <div class="map-overlay">
        <button class="map-btn" onclick="centerMap()">📍</button>
        <button class="map-btn" onclick="toggleRoute()" id="routeBtn">🗺</button>
      </div>
      <div class="map-info-bar">
        <div class="map-info-item">
          <div class="map-info-label">이동 거리</div>
          <div class="map-info-val live" id="mapDist">0.0 km</div>
        </div>
        <div class="map-sep"></div>
        <div class="map-info-item">
          <div class="map-info-label">정확도</div>
          <div class="map-info-val" id="mapAcc">—</div>
        </div>
        <div class="map-sep"></div>
        <div class="map-info-item">
          <div class="map-info-label">속도</div>
          <div class="map-info-val" id="mapSpeed">— km/h</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">오늘</div>
      <div class="time-grid">
        <div class="time-box">
          <div class="tb-label">출근</div>
          <div class="tb-value in" id="inTimeDisplay"><span class="tb-empty">미기록</span></div>
        </div>
        <div class="time-box">
          <div class="tb-label">퇴근</div>
          <div class="tb-value out" id="outTimeDisplay"><span class="tb-empty">미기록</span></div>
        </div>
      </div>
      <div class="work-row">
        <span>근무 시간</span>
        <span class="work-val" id="workDuration">—</span>
      </div>
    </div>

    <div class="two-col">
      <div class="mini-card">
        <div class="mc-label">이동 거리</div>
        <div class="mc-value" id="distVal">0.0</div>
        <div class="mc-unit">km (편도)</div>
      </div>
      <div class="mini-card">
        <div class="mc-label">오늘 연료비</div>
        <div class="mc-value" id="todayFuelCost">—</div>
        <div class="mc-unit">원 (왕복)</div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">⛽ 연비 설정</div>
      <div class="fuel-inputs">
        <div class="input-group">
          <label>연비 (km/L)</label>
          <input type="number" id="fuelEff" value="12" min="1" max="99" step="0.1" inputmode="decimal" oninput="saveFuel();updateFuel()">
        </div>
        <div class="input-group">
          <label>유가 (원/L)</label>
          <input type="number" id="fuelPrice" value="1700" min="100" max="9999" step="10" inputmode="numeric" oninput="saveFuel();updateFuel()">
        </div>
      </div>
      <div class="fuel-result" id="fuelResult" style="display:none">
        <div class="fr-row"><span>편도 거리</span><span class="fr-val" id="frOneway">—</span></div>
        <div class="fr-row"><span>왕복 거리</span><span class="fr-val" id="frRound">—</span></div>
        <div class="fr-row"><span>사용 연료</span><span class="fr-val" id="frLiters">—</span></div>
        <div class="fr-row"><span>왕복 연료비</span><span class="fr-val" id="frCost">—</span></div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-label">이번 주 출근</div>
        <div class="stat-value" id="weekDays">0</div>
        <div class="stat-sub">일</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">이달 연료비</div>
        <div class="stat-value" id="monthFuel">—</div>
        <div class="stat-sub">원 (누적)</div>
      </div>
    </div>

    <div>
      <button class="btn-main btn-in"  id="checkInBtn"  onclick="checkIn()">🏢 출근 체크인</button>
      <button class="btn-main btn-out" id="checkOutBtn" onclick="checkOut()" style="display:none">🏠 퇴근 체크아웃</button>
      <button class="btn-reset" onclick="resetToday()">오늘 기록 초기화</button>
    </div>

    <div class="card">
      <div class="hist-header">
        <div class="card-label" style="margin:0">기록</div>
        <div class="month-tabs" id="monthTabs"></div>
      </div>
      <div id="historyList"></div>
    </div>

  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════
//  Leaflet 지도 (OpenStreetMap)
// ════════════════════════════════════
let leafMap     = null;
let locMarker   = null;
let routePoly   = null;
let showRoute   = true;
let routeCoords = [];

function initMap() {
  leafMap = L.map('map', {
    center: [37.5665, 126.9780],
    zoom: 15,
    zoomControl: true,
    attributionControl: false,
  });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
  }).addTo(leafMap);
}

function updateMarker(lat, lng) {
  if (!leafMap) return;
  const pos  = [lat, lng];
  const icon = L.divIcon({
    className: '',
    html: `<div style="width:18px;height:18px;background:#2563eb;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(37,99,235,.6)"></div>`,
    iconSize: [18, 18], iconAnchor: [9, 9],
  });
  if (!locMarker) {
    locMarker = L.marker(pos, { icon }).addTo(leafMap);
  } else {
    locMarker.setLatLng(pos);
  }
}

function updatePolyline() {
  if (!leafMap) return;
  if (routePoly) { routePoly.remove(); routePoly = null; }
  if (!showRoute || routeCoords.length < 2) return;
  routePoly = L.polyline(routeCoords, {
    color: '#2563eb', weight: 5, opacity: 0.85,
    lineJoin: 'round', lineCap: 'round',
  }).addTo(leafMap);
}

function centerMap() {
  if (!leafMap) return;
  if (locMarker) {
    leafMap.setView(locMarker.getLatLng(), 16, { animate: true });
  } else {
    showToast('📍 위치를 아직 못 찾았어요');
  }
}

function toggleRoute() {
  showRoute = !showRoute;
  document.getElementById('routeBtn').textContent = showRoute ? '🗺' : '📏';
  updatePolyline();
}

// onNaverMapLoad 대신 바로 initApp 호출
function onNaverMapLoad() {} // 빈 함수 (호환성 유지)

// ════════════════════════════════════
//  GPS
// ════════════════════════════════════
let watchId     = null;
let startPos    = null;
let currentDist = 0;
let firstFix    = true;

function startGPS() {
  if (!navigator.geolocation) { setGPS('err', 'GPS 미지원'); return; }
  firstFix = true;
  setGPS('wait', '위치 찾는중');
  watchId = navigator.geolocation.watchPosition(onPos, onErr, {
    enableHighAccuracy: true,
    maximumAge: 2000,
    timeout: 30000,
  });
}

function stopGPS() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  setGPS('off', 'GPS');
}

function retryGPS() {
  stopGPS();
  currentDist = 0; startPos = null;
  routeCoords = []; updatePolyline();
  startGPS();
}

function onPos(pos) {
  // 지도가 아직 초기화 안 됐으면 무시
  if (!naverMap) return;

  const { latitude:la, longitude:lo, accuracy:ac, speed:sp } = pos.coords;

  if (firstFix) {
    firstFix = false;
    leafMap.setView([la, lo], 16, { animate: true });
    setGPS('on', '추적중');
  }

  updateMarker(la, lo);

  document.getElementById('mapAcc').textContent  = `±${Math.round(ac)}m`;
  document.getElementById('mapSpeed').textContent =
    (sp != null && sp >= 0) ? `${Math.round(sp * 3.6)} km/h` : '— km/h';

  if (ac <= 100) {
    if (!startPos) {
      startPos = { la, lo };
      routeCoords.push([la, lo]);
    } else {
      const d = haversine(startPos.la, startPos.lo, la, lo);
      if (d > 0.010) {
        currentDist += d;
        startPos = { la, lo };
        const disp = (Math.round(currentDist * 10) / 10).toFixed(1);
        document.getElementById('distVal').textContent = disp;
        document.getElementById('mapDist').textContent = disp + ' km';
        routeCoords.push([la, lo]);
        updatePolyline();
        updateFuel();
      }
    }
  }
}

function onErr(err) {
  const msgs = { 1:'권한 거부됨', 2:'신호 없음', 3:'시간 초과' };
  setGPS('err', msgs[err.code] || '오류');
  showToast('📍 위치 권한을 허용해주세요');
}

function setGPS(state, label) {
  const dot = document.getElementById('gpsDot');
  dot.className = 'gps-dot' + (state==='on' ? ' on' : state==='err' ? ' err' : '');
  document.getElementById('gpsText').textContent = label;
}

function haversine(la1,lo1,la2,lo2) {
  const R=6371, dL=(la2-la1)*Math.PI/180, dl=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dl/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ════════════════════════════════════
//  앱 상태
// ════════════════════════════════════
let today        = {};
let history      = JSON.parse(localStorage.getItem('commuteHistory') || '[]');
let currentMonth = new Date().getMonth();
const todayKey   = () => new Date().toISOString().slice(0,10);

function loadFuel() {
  const s = JSON.parse(localStorage.getItem('fuelSettings') || '{}');
  if (s.eff)   document.getElementById('fuelEff').value   = s.eff;
  if (s.price) document.getElementById('fuelPrice').value = s.price;
}
function saveFuel() {
  localStorage.setItem('fuelSettings', JSON.stringify({
    eff:   document.getElementById('fuelEff').value,
    price: document.getElementById('fuelPrice').value,
  }));
}
function getFuel() {
  return {
    eff:   parseFloat(document.getElementById('fuelEff').value)   || 12,
    price: parseFloat(document.getElementById('fuelPrice').value) || 1700,
  };
}
function calcCost(km) {
  const {eff, price} = getFuel();
  return Math.round((km * 2 / eff) * price);
}
function updateFuel() {
  const dist = currentDist > 0 ? currentDist : (today.distance || 0);
  if (dist < 0.05) {
    document.getElementById('fuelResult').style.display = 'none';
    document.getElementById('todayFuelCost').textContent = '—';
    updateMonthFuel(); return;
  }
  const {eff, price} = getFuel();
  const rounded = Math.round(dist * 10) / 10;
  const rt = rounded * 2, L = rt / eff, cost = Math.round(L * price);
  document.getElementById('frOneway').textContent  = rounded.toFixed(1) + ' km';
  document.getElementById('frRound').textContent   = rt.toFixed(1)      + ' km';
  document.getElementById('frLiters').textContent  = L.toFixed(2)       + ' L';
  document.getElementById('frCost').textContent    = cost.toLocaleString() + ' 원';
  document.getElementById('fuelResult').style.display = 'block';
  document.getElementById('todayFuelCost').textContent = cost.toLocaleString();
  updateMonthFuel();
}
function updateMonthFuel() {
  const m    = new Date().getMonth();
  const recs = history.filter(h => new Date(h.date).getMonth() === m && h.distance);
  document.getElementById('monthFuel').textContent =
    recs.length ? recs.reduce((s,h) => s + calcCost(h.distance), 0).toLocaleString() : '—';
}

function checkIn() {
  today.date   = todayKey();
  today.inTime = new Date().toTimeString().slice(0,5);
  currentDist  = 0; routeCoords = []; startPos = null;
  document.getElementById('distVal').textContent = '0.0';
  document.getElementById('mapDist').textContent = '0.0 km';
  document.getElementById('fuelResult').style.display = 'none';
  document.getElementById('todayFuelCost').textContent = '—';
  updatePolyline();
  saveToday(); renderToday();
  // 기존 GPS 워처가 있으면 반드시 먼저 중단 후 재시작 (중복 방지)
  stopGPS();
  startGPS();
  showToast('🏢 출근 기록 완료!');
}
function checkOut() {
  today.outTime  = new Date().toTimeString().slice(0,5);
  today.distance = parseFloat((Math.round(currentDist * 10) / 10).toFixed(1));
  saveToday(); stopGPS();
  const idx = history.findIndex(h => h.date === today.date);
  if (idx >= 0) history[idx] = {...today}; else history.unshift({...today});
  saveHistory();
  renderToday(); renderStats(); renderHistory(); updateFuel();
  showToast('🏠 퇴근 완료! ' + today.distance.toFixed(1) + 'km');
}
function resetToday() {
  if (!confirm('오늘 기록을 초기화할까요?')) return;
  today = {date:todayKey()}; currentDist = 0; routeCoords = []; startPos = null;
  document.getElementById('distVal').textContent = '0.0';
  document.getElementById('mapDist').textContent = '0.0 km';
  document.getElementById('fuelResult').style.display = 'none';
  document.getElementById('todayFuelCost').textContent = '—';
  stopGPS(); updatePolyline(); saveToday(); renderToday();
  showToast('초기화 완료');
}

function renderToday() {
  const inEl  = document.getElementById('inTimeDisplay');
  const outEl = document.getElementById('outTimeDisplay');
  const inBtn  = document.getElementById('checkInBtn');
  const outBtn = document.getElementById('checkOutBtn');
  if (today.inTime) {
    inEl.textContent = today.inTime; inEl.className = 'tb-value in';
    inBtn.style.display = 'none'; outBtn.style.display = 'flex';
  } else {
    inEl.innerHTML = '<span class="tb-empty">미기록</span>'; inEl.className = 'tb-value';
    inBtn.style.display = 'flex'; outBtn.style.display = 'none';
  }
  if (today.outTime) {
    outEl.textContent = today.outTime; outEl.className = 'tb-value out';
    outBtn.style.display = 'none'; inBtn.style.display = 'flex';
  } else {
    outEl.innerHTML = '<span class="tb-empty">미기록</span>'; outEl.className = 'tb-value';
  }
  const dur = document.getElementById('workDuration');
  if (today.inTime && today.outTime) {
    const [ih,im]=today.inTime.split(':').map(Number), [oh,om]=today.outTime.split(':').map(Number);
    const mins=(oh*60+om)-(ih*60+im);
    dur.textContent = `${Math.floor(mins/60)}시간 ${mins%60}분`;
  } else dur.textContent = '—';
  if (today.distance) {
    document.getElementById('distVal').textContent = today.distance.toFixed(1);
    document.getElementById('mapDist').textContent = today.distance.toFixed(1) + ' km';
    updateFuel();
  }
}
function renderStats() {
  const now=new Date(), ws=new Date(now);
  ws.setDate(now.getDate()-now.getDay()+1); ws.setHours(0,0,0,0);
  document.getElementById('weekDays').textContent = history.filter(h=>new Date(h.date)>=ws).length;
  updateMonthFuel();
}
function renderMonthTabs() {
  const months=[...new Set(history.map(h=>new Date(h.date).getMonth()))];
  if (!months.includes(new Date().getMonth())) months.unshift(new Date().getMonth());
  months.sort((a,b)=>b-a);
  document.getElementById('monthTabs').innerHTML = months.slice(0,3).map(m=>
    `<button class="month-tab ${m===currentMonth?'active':''}" onclick="switchMonth(${m})">${m+1}월</button>`
  ).join('');
}
function switchMonth(m) { currentMonth=m; renderMonthTabs(); renderHistory(); }
function renderHistory() {
  const el = document.getElementById('historyList');
  const list = history.filter(h=>new Date(h.date).getMonth()===currentMonth);
  if (!list.length) {
    el.innerHTML='<div class="empty-state"><span class="empty-icon">📭</span>이 달의 기록이 없습니다</div>'; return;
  }
  const dn=['일','월','화','수','목','금','토'];
  el.innerHTML = list.map(h => {
    const d=new Date(h.date);
    let dur='—';
    if (h.inTime && h.outTime) {
      const [ih,im]=h.inTime.split(':').map(Number),[oh,om]=h.outTime.split(':').map(Number);
      const m=(oh*60+om)-(ih*60+im); dur=`${Math.floor(m/60)}h ${m%60}m`;
    }
    return `<div class="history-item">
      <div class="h-date"><div class="h-weekday">${dn[d.getDay()]}</div><div class="h-day">${d.getDate()}</div></div>
      <div class="h-mid">
        <div class="h-time-row"><span class="h-badge in">출근</span><span class="h-tval">${h.inTime||'—'}</span></div>
        <div class="h-time-row"><span class="h-badge out">퇴근</span><span class="h-tval">${h.outTime||'—'}</span></div>
        <div class="h-dur">${dur}</div>
      </div>
      <div class="h-right">
        <div class="h-dist">${h.distance ? h.distance.toFixed(1)+' km' : '—'}</div>
        <div class="h-fuel">${h.distance ? '⛽ '+calcCost(h.distance).toLocaleString()+'원' : ''}</div>
      </div>
    </div>`;
  }).join('');
}

function saveToday()   { localStorage.setItem('commuteToday',   JSON.stringify(today)); }
function saveHistory() { localStorage.setItem('commuteHistory', JSON.stringify(history)); }
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// 지도 로드 완료 후 onNaverMapLoad() → initApp() 순서로 실행됨
function initApp() {
  document.getElementById('todayDate').textContent =
    new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  loadFuel();

  const saved = localStorage.getItem('commuteToday');
  if (saved) {
    const p = JSON.parse(saved);
    if (p.date === todayKey()) {
      today = p;
    } else {
      if (p.inTime && !history.find(h=>h.date===p.date)) { history.unshift(p); saveHistory(); }
      today = {date:todayKey()}; saveToday();
    }
  } else { today = {date:todayKey()}; }

  renderToday(); renderStats(); renderMonthTabs(); renderHistory();

  // 지도가 완전히 준비된 후 GPS 시작
  startGPS();
}

// Leaflet은 스크립트 로드 즉시 사용 가능 → 직접 실행
initMap();
initApp();
</script>
