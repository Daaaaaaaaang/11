<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정비 일정 관리</title>
<style>
  :root {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#232636; --border:#2e3248;
    --accent:#4f7fff; --accent2:#ff6b35; --text:#e8eaf0; --text-muted:#6b7294;
    --green:#3ddc84; --yellow:#ffd166; --red:#ff4d6d;
  }
  :root.light {
    --bg:#f5f6fa; --surface:#ffffff; --surface2:#f0f2f7; --border:#dde1ee;
    --accent:#3a6ff7; --accent2:#e85d1f; --text:#1a1d2e; --text-muted:#7a82a0;
    --green:#1cab5e; --yellow:#d4920a; --red:#d63050;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Apple SD Gothic Neo','Pretendard',-apple-system,BlinkMacSystemFont,'Malgun Gothic','맑은 고딕',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;max-width:100vw;}
  #pw-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;}
  .pw-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:36px 32px;width:100%;max-width:340px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.4);}
  .pw-box h2{font-size:18px;font-weight:700;margin-bottom:6px;}
  .pw-box p{font-size:13px;color:var(--text-muted);margin-bottom:22px;}
  .pw-input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:15px;font-family:inherit;outline:none;text-align:center;letter-spacing:3px;margin-bottom:12px;transition:border-color 0.15s;}
  .pw-input:focus{border-color:var(--accent);}
  .pw-btn{width:100%;padding:10px;border-radius:8px;border:none;background:var(--accent);color:white;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity 0.15s;}
  .pw-btn:hover{opacity:0.85;}
  .pw-error{font-size:12px;color:var(--red);margin-top:8px;display:none;}

  /* Header */
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:flex-end;position:sticky;top:0;z-index:200;box-shadow:0 1px 8px rgba(0,0,0,0.3);gap:10px;flex-wrap:wrap;}
  .header-row1{display:contents;}
  .header-row2{display:contents;}
  .header-row3{display:none;}
  header h1{font-size:17px;font-weight:700;white-space:nowrap;margin-right:auto;}
  header h1 span{color:var(--accent);}
  .header-right{display:flex;align-items:center;gap:10px;}
  .stats{display:flex;gap:16px;font-family:'Courier New',Courier,monospace;font-size:13px;color:var(--text-muted);}
  .stats b{color:var(--text);}
  .clock-block{display:flex;flex-direction:column;align-items:flex-end;gap:1px;border-right:1px solid var(--border);padding-right:14px;margin-right:2px;}
  .clock-time{font-family:'Courier New',Courier,monospace;font-size:19px;font-weight:500;color:var(--text);letter-spacing:1px;line-height:1.1;}
  .clock-date{font-family:'Courier New',Courier,monospace;font-size:12px;color:var(--text-muted);letter-spacing:0.3px;}
  .btn-add{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600;padding:6px 13px;border-radius:6px;border:none;background:var(--accent);color:white;cursor:pointer;transition:opacity 0.15s;font-family:inherit;}
  .btn-add:hover{opacity:0.85;}
  .btn-theme{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
  .btn-theme:hover{border-color:var(--accent);}
  .btn-refresh{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color 0.2s;padding:0;}
  .btn-refresh:hover{border-color:var(--green);}
  .btn-refresh svg{width:18px;height:18px;}
  .btn-refresh .spinner-ring{transform-origin:50% 50%;animation:none;}
  .btn-refresh.spinning .spinner-ring{animation:ios-spin 0.9s linear infinite;}
  @keyframes ios-spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  .btn-parts-toggle{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:6px 11px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);cursor:pointer;transition:all 0.15s;font-family:inherit;white-space:nowrap;}
  .btn-parts-toggle:hover{border-color:var(--accent2);color:var(--accent2);}
  .btn-parts-toggle.active{background:var(--accent2);border-color:var(--accent2);color:white;}
  .btn-ics{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:6px 11px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);cursor:pointer;transition:all 0.15s;font-family:inherit;white-space:nowrap;}
  .btn-ics:hover{border-color:var(--green);color:var(--green);}
  .last-updated{font-size:11px;color:var(--text-muted);white-space:nowrap;}
  .last-updated b{color:var(--green);}
  .btn-ics{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:6px 11px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);cursor:pointer;transition:all 0.15s;font-family:inherit;white-space:nowrap;}
  .btn-ics:hover{border-color:var(--green);color:var(--green);}
  .last-updated{font-size:11px;color:var(--text-muted);white-space:nowrap;}
  .last-updated b{color:var(--green);}

  /* Search */
  .search-wrap{width:320px;max-width:380px;margin:0 auto 0 16px;position:relative;display:flex;align-items:center;}
  .search-icon{position:absolute;left:10px;font-size:14px;pointer-events:none;opacity:0.5;}
  .search-input{width:100%;padding:7px 32px 7px 30px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color 0.15s;}
  .search-input:focus{border-color:var(--accent);}
  .search-input::placeholder{color:var(--text-muted);}
  .search-clear{position:absolute;right:8px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;display:none;padding:2px 4px;border-radius:3px;}
  .search-clear.visible{display:block;}
  .search-highlight{background:rgba(255,210,0,0.35);border-radius:2px;padding:0 1px;}
  :root.light .search-highlight{background:rgba(255,170,0,0.3);}
  .search-empty{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:14px;}

  /* Layout */
  .main{max-width:1400px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr 300px;gap:24px;align-items:start;}
  .content{min-width:0;width:100%;overflow:hidden;}
  #scheduleContainer{width:100%;max-width:100%;overflow:hidden;}

  /* Filters */
  .filters{display:flex;gap:6px;padding-bottom:18px;flex-wrap:wrap;width:100%;max-width:100%;}
  .filter-btn{font-size:12px;padding:4px 11px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;transition:all 0.15s;font-family:inherit;white-space:nowrap;}
  .filter-btn:hover,.filter-btn.active{background:var(--accent);border-color:var(--accent);color:white;}
  .filter-btn.filter-parts.active{background:var(--accent2);border-color:var(--accent2);color:white;}
  .filter-btn.filter-parts:hover{background:var(--accent2);border-color:var(--accent2);color:white;}

  /* Day section */
  .day-section{margin-bottom:24px;width:100%;max-width:100%;overflow:hidden;}
  .day-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .day-label{font-family:'Courier New',Courier,monospace;font-size:13px;font-weight:500;color:var(--accent);background:rgba(79,127,255,0.1);border:1px solid rgba(79,127,255,0.3);padding:3px 10px;border-radius:4px;}
  .day-label.today{color:#fff;background:var(--accent);border-color:var(--accent);}
  .day-label.today::after{content:' · 오늘';font-size:11px;opacity:0.85;}
  .day-count{font-size:13px;color:var(--text-muted);}

  /* Job card */
  .job-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:7px;display:grid;grid-template-columns:46px 1fr auto;gap:10px;align-items:start;transition:border-color 0.2s,box-shadow 0.2s;position:relative;width:100%;box-sizing:border-box;overflow:hidden;}
  .job-card:hover{border-color:rgba(79,127,255,0.4);box-shadow:0 2px 10px rgba(79,127,255,0.12);}
  .job-card.is-done{opacity:0.45;}
  .job-card.is-cancelled{opacity:0.4;background:rgba(58,31,31,0.5);border-color:#4a2020;}
  :root.light .job-card.is-cancelled{background:#fff5f5;border-color:#f5c0c0;}
  .job-card.is-cancelled .job-title{text-decoration:line-through;}
  .status-badge{position:absolute;top:8px;right:44px;font-size:11px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:0.4px;}
  .badge-cancel{color:var(--red);background:rgba(255,77,109,0.1);border:1px solid rgba(255,77,109,0.3);}
  .badge-done{color:var(--green);background:rgba(61,220,132,0.1);border:1px solid rgba(61,220,132,0.3);}
  .time-col{font-family:'Courier New',Courier,monospace;font-size:15px;color:var(--text-muted);padding-top:2px;text-align:right;line-height:1.7;min-width:0;word-break:break-word;}
  .job-body{min-width:0;overflow:hidden;overflow-wrap:break-word;word-break:break-word;}
  .job-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:4px;max-width:100%;}
  .job-title{font-size:14px;color:var(--text);line-height:1.5;margin-bottom:2px;overflow-wrap:break-word;word-break:break-word;}
  .job-note{font-size:12px;color:var(--text-muted);line-height:1.5;background:var(--surface2);border-left:2px solid var(--border);padding:4px 8px;border-radius:0 4px 4px 0;margin-top:4px;overflow-wrap:break-word;word-break:break-word;}
  .phone{font-family:'Courier New',Courier,monospace;font-size:12px;color:var(--green);margin-top:3px;opacity:0.85;overflow-wrap:break-word;word-break:break-all;}

  /* Car model badge - color by series */
  .car-model{font-family:'Courier New',Courier,monospace;font-size:13px;font-weight:500;padding:1px 7px;border-radius:3px;border-width:1px;border-style:solid;}
  .plate{font-family:'Courier New',Courier,monospace;font-size:15px;font-weight:700;color:var(--yellow);}
  .vin{font-family:'Courier New',Courier,monospace;font-size:13px;font-weight:700;color:var(--text);background:var(--surface2);border:1px solid var(--border);padding:1px 7px;border-radius:3px;}

  /* Parts checkboxes */
  .parts-block{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
  .parts-block-label{font-size:11px;color:var(--text-muted);font-weight:500;letter-spacing:0.5px;margin-bottom:3px;}
  .part-row{display:flex;align-items:center;gap:8px;padding:4px 7px;border-radius:5px;cursor:pointer;transition:background 0.12s;user-select:none;}
  .part-row:hover{background:var(--surface2);}
  .part-row.checked{opacity:0.4;}
  .part-row.checked .part-label{text-decoration:line-through;color:var(--text-muted);}
  .cb-box{width:15px;height:15px;min-width:15px;border:1.5px solid rgba(255,107,53,0.45);border-radius:3px;background:rgba(255,107,53,0.06);display:flex;align-items:center;justify-content:center;transition:all 0.13s;}
  .part-row.checked .cb-box{background:var(--accent2);border-color:var(--accent2);}
  .cb-box svg{display:none;width:9px;height:9px;}
  .part-row.checked .cb-box svg{display:block;}
  .part-label{font-size:13px;color:var(--accent2);line-height:1.4;flex:1;overflow-wrap:break-word;}
  .part-memo-btn{background:none;border:none;cursor:pointer;font-size:13px;opacity:0.35;padding:0 2px;line-height:1;transition:opacity 0.13s;flex-shrink:0;}
  .part-memo-btn:hover{opacity:0.9;}
  .part-memo-btn.has-memo{opacity:0.85;color:var(--yellow);}
  .part-memo-wrap{padding:2px 7px 5px 30px;display:none;}
  .part-memo-wrap.open{display:block;}
  .part-memo-wrap.always{display:block;}
  .part-memo-input{width:100%;font-size:12px;font-family:inherit;background:transparent;border:none;border-bottom:1px dashed var(--border);color:var(--text-muted);outline:none;padding:2px 0;line-height:1.5;}
  .part-memo-input:focus{border-bottom-color:var(--accent);color:var(--text);}
  .part-memo-input::placeholder{color:var(--border);}
  .part-memo-text{font-size:12px;color:var(--text-muted);font-style:italic;line-height:1.5;padding:2px 0;cursor:pointer;}
  .part-memo-text:hover{color:var(--text);}

  /* Card actions */
  .card-actions{display:flex;flex-direction:column;gap:4px;padding-top:2px;}
  .btn-icon{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.13s;}
  .btn-icon:hover{border-color:var(--accent);color:var(--accent);background:rgba(79,127,255,0.08);}
  .btn-icon.btn-del:hover{border-color:var(--red);color:var(--red);background:rgba(255,77,109,0.08);}
  .section-divider{height:1px;background:var(--border);margin:18px 0;opacity:0.5;}

  /* Sidebar */
  .sidebar{position:sticky;top:68px;display:flex;flex-direction:column;gap:12px;}
  .sb-section-title{font-size:14px;font-weight:700;color:var(--text-muted);letter-spacing:0.5px;padding:11px 15px 8px;background:var(--surface2);border-bottom:1px solid var(--border);}
  .sb-section-title span{float:right;color:var(--accent2);font-weight:400;}
  .undone-list{padding:6px 9px 10px;max-height:200px;overflow-y:auto;}
  .undone-row{display:flex;align-items:flex-start;justify-content:space-between;padding:5px 7px;border-radius:5px;border-bottom:1px solid rgba(46,50,72,0.4);gap:6px;}
  .undone-row:last-child{border-bottom:none;}
  .undone-info{min-width:0;flex:1;}
  .undone-model{font-family:'Courier New',Courier,monospace;font-size:12px;font-weight:600;}
  .undone-plate{font-family:'Courier New',Courier,monospace;font-size:11px;color:var(--yellow);}
  .undone-title{font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;}
  .undone-date{font-family:'Courier New',Courier,monospace;font-size:11px;color:var(--text-muted);white-space:nowrap;}
  .long-list{padding:8px 10px 10px;max-height:65vh;overflow-y:auto;display:flex;flex-direction:column;gap:7px;}
  .long-card{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 11px;cursor:pointer;transition:border-color 0.15s;}
  .long-card:hover{border-color:var(--accent);}
  .long-card-expand{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
  .long-card-expand.open{display:block;}
  .long-card-expand-row{font-size:13px;color:var(--text-muted);line-height:1.7;}
  .long-card-expand-row b{color:var(--text);font-weight:600;}
  .long-card-chevron{font-size:12px;color:var(--text-muted);transition:transform 0.2s;display:inline-block;}
  .long-card.open .long-card-chevron{transform:rotate(180deg);}
  .long-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .long-card-model{font-family:'Courier New',Courier,monospace;font-size:14px;font-weight:700;padding:1px 6px;border-radius:3px;border-width:1px;border-style:solid;}
  .long-card-plate{font-family:'Courier New',Courier,monospace;font-size:14px;font-weight:700;color:var(--yellow);}
  .long-card-days{font-family:'Courier New',Courier,monospace;font-size:14px;font-weight:700;white-space:nowrap;}
  .long-card-days.warn{color:var(--red);}
  .long-card-days.caution{color:var(--yellow);}
  .long-card-days.ok{color:var(--green);}
  .long-card-title{font-size:13px;color:var(--text-muted);overflow-wrap:break-word;word-break:break-word;white-space:normal;line-height:1.4;margin-top:2px;}
  .long-card-dates{font-family:'Courier New',Courier,monospace;font-size:12px;color:var(--text-muted);margin-top:3px;}
  .long-card-dday{font-family:'Courier New',Courier,monospace;font-size:12px;font-weight:700;margin-top:2px;}
  .long-card-dday.warn{color:var(--red);}
  .long-card-dday.caution{color:var(--yellow);}
  .long-card-dday.ok{color:var(--green);}
  .sidebar-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,0.3);}
  .sidebar-header{background:var(--surface2);border-bottom:1px solid var(--border);padding:12px 15px;font-size:16px;font-weight:700;color:var(--text);}
  .sidebar-header span{color:var(--accent2);font-weight:400;font-size:15px;}
  .progress-bar{height:3px;background:var(--border);border-radius:2px;margin:13px 15px 5px;}
  .progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width 0.3s;width:0%;}
  .progress-label{padding:0 15px 11px;font-size:14px;color:var(--text-muted);font-family:'Courier New',Courier,monospace;display:flex;justify-content:space-between;}
  .summary-list{padding:4px 9px 11px;max-height:60vh;overflow-y:auto;}
  .summary-list::-webkit-scrollbar{width:4px;}
  .summary-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .summary-row{display:flex;align-items:center;justify-content:space-between;padding:6px 7px;border-radius:5px;gap:6px;border-bottom:1px solid rgba(46,50,72,0.5);}
  .summary-row:last-child{border-bottom:none;}
  .sum-model{font-family:'Courier New',Courier,monospace;font-size:14px;}
  .sum-plate{font-size:14px;color:var(--text-muted);}
  .sum-date{font-family:'Courier New',Courier,monospace;font-size:13px;color:var(--text-muted);}
  .sum-count{font-family:'Courier New',Courier,monospace;font-size:14px;white-space:nowrap;}
  .c-done{color:var(--green);} .c-partial{color:var(--yellow);} .c-none{color:var(--text-muted);}

  /* Modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,12,25,0.7);z-index:500;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border-radius:12px;padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.5);border:1px solid var(--border);}
  .modal h2{font-size:16px;font-weight:700;margin-bottom:18px;color:var(--text);}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  .form-row.full{grid-template-columns:1fr;}
  .form-group{display:flex;flex-direction:column;gap:4px;}
  .form-group label{font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:0.4px;}
  .form-group input,.form-group textarea,.form-group select{font-family:inherit;font-size:14px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);outline:none;transition:border-color 0.15s;}
  .form-group input:focus,.form-group textarea:focus{border-color:var(--accent);}
  .form-group textarea{resize:vertical;min-height:60px;}
  .parts-editor{border:1px solid var(--border);border-radius:6px;overflow:hidden;}
  .parts-editor-item{display:flex;align-items:center;gap:6px;padding:6px 10px;border-bottom:1px solid var(--border);}
  .parts-editor-item:last-child{border-bottom:none;}
  .parts-editor-item input{flex:1;border:none;background:transparent;font-size:14px;font-family:inherit;color:var(--text);outline:none;}
  .btn-remove-part{width:20px;height:20px;border-radius:4px;border:none;background:rgba(255,77,109,0.1);color:var(--red);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .btn-add-part{width:100%;padding:7px;border:1px dashed var(--border);border-radius:6px;background:transparent;color:var(--text-muted);cursor:pointer;font-size:13px;font-family:inherit;margin-top:6px;transition:all 0.13s;}
  .btn-add-part:hover{border-color:var(--accent);color:var(--accent);}
  .status-toggles{display:flex;gap:8px;margin-bottom:10px;}
  .toggle-btn{flex:1;padding:7px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);cursor:pointer;font-size:13px;font-family:inherit;transition:all 0.13s;text-align:center;}
  .toggle-btn.active-done{background:rgba(61,220,132,0.1);border-color:var(--green);color:var(--green);font-weight:600;}
  .toggle-btn.active-cancel{background:rgba(255,77,109,0.1);border-color:var(--red);color:var(--red);font-weight:600;}
  .modal-footer{display:flex;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}

  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

}

// ── Sort ─────────────────────────────────────────────────
function sortKey(j) {
  try {
    const [m,d] = j.date.split('/');
    const [h,mn] = j.time && j.time.includes(':') ? j.time.split(':') : ['99','0'];
    return parseInt(m)*100000 + parseInt(d)*1000 + parseInt(h)*10 + parseInt(mn);
  } catch(e) { return 9999999; }
}
function sortJobs() { JOBS.sort((a,b) => sortKey(a) - sortKey(b)); }

// ── Clock ─────────────────────────────────────────────────
function getNow() { return new Date(new Date().toLocaleString('en-US', {timeZone:'Asia/Seoul'})); }
function getTodayStr() { const n = getNow(); return `${n.getMonth()+1}/${n.getDate()}`; }
function updateClock() {
  const now = getNow();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  const yyyy = now.getFullYear();
  const mo = String(now.getMonth()+1).padStart(2,'0');
  const dd = String(now.getDate()).padStart(2,'0');
  document.getElementById('clockTime').textContent = `${hh}:${mm}:${ss}`;
  document.getElementById('clockDate').textContent = `${yyyy}.${mo}.${dd} (${DAY_KO[now.getDay()]})`;
  const hdr = document.getElementById('headerMonth');
  if (hdr) hdr.textContent = `${yyyy}년 ${now.getMonth()+1}월`;
}
setInterval(updateClock, 1000);

function getDayName(dateStr) {
  try {
    const [m,d] = dateStr.split('/');
    const dt = new Date(2026, parseInt(m)-1, parseInt(d));
    return DAY_KO[dt.getDay()];
  } catch(e) { return ''; }
}

function rebuildFilters() {
  const seen = [];
  JOBS.forEach(j => { if (!seen.includes(j.date)) seen.push(j.date); });
  seen.sort((a,b) => sortKey({date:a,time:'00:00'}) - sortKey({date:b,time:'00:00'}));
  const c = document.getElementById('filterBtns');
  c.innerHTML = `<button class="filter-btn ${currentFilter==='all'?'active':''}" onclick="filterJobs('all',this)">전체</button>`;
  seen.forEach(date => {
    const [m,d] = date.split('/');
    const active = currentFilter === date ? ' active' : '';
    c.innerHTML += `<button class="filter-btn${active}" onclick="filterJobs('${date}',this)">${m}/${d} (${getDayName(date)})</button>`;
  });
}

function renderSchedule() {
  sortJobs();
  rebuildFilters();
  const container = document.getElementById('scheduleContainer');
  container.innerHTML = '';
  const totalVisible = JOBS.filter(j => jobMatchesSearch(j)).length;
  if (searchQuery && totalVisible === 0) {
    container.innerHTML = '<div class="search-empty">🔍 <b>"' + searchQuery + '"</b> 검색 결과가 없습니다.</div>';
    return;
  }
  const byDate = {};
  JOBS.forEach((job,i) => {
    if (!byDate[job.date]) byDate[job.date] = [];
    byDate[job.date].push(i);
  });
  const dates = Object.keys(byDate).sort((a,b) => sortKey({date:a,time:'0'}) - sortKey({date:b,time:'0'}));
  const todayStr = getTodayStr();

  dates.forEach((date, di) => {
    if (currentFilter !== 'all' && date !== currentFilter) return;
    const indices = byDate[date];
    // partsOnly: 해당 날짜에 발주부품 있는 카드가 없으면 날짜 섹션 통째로 숨김
    if (partsOnly) {
      const hasPartsInDate = indices.some(i => {
        const j = JOBS[i];
        return j.parts && j.parts.length > 0 && !j.done && !j.cancelled;
      });
      if (!hasPartsInDate) return;
    }
    const filteredIndices = indices.filter(ji => jobMatchesSearch(JOBS[ji]));
    if (filteredIndices.length === 0) return;
    const activeCount = filteredIndices.filter(i => !JOBS[i].done && !JOBS[i].cancelled).length;
    const [m,d] = date.split('/');
    const isToday = date === todayStr;
    const section = document.createElement('div');
    section.className = 'day-section';
    section.innerHTML = `<div class="day-header"><span class="day-label${isToday?' today':''}">${m}월 ${d}일 (${getDayName(date)})</span><span class="day-count">${activeCount}건</span></div>`;

    indices.forEach(ji => {
      const job = JOBS[ji];
      if (!jobMatchesSearch(job)) return;
      if (partsOnly && !(job.parts && job.parts.length > 0)) return;
      const card = document.createElement('div');
      card.className = 'job-card'+(job.done?' is-done':'')+(job.cancelled?' is-cancelled':'');
      const endStr = job.endDate ? `<br><span style="font-size:10px;opacity:.5">→${job.endDate}</span>` : '';
      const badge = job.cancelled ? '<span class="status-badge badge-cancel">취소</span>' : job.done ? '<span class="status-badge badge-done">완료</span>' : '';
      const noteHtml = job.note ? `<div class="job-note">💬 ${highlight(job.note, searchQuery)}</div>` : '';
      const phoneHtml = job.phone ? `<div class="phone">📞 ${highlight(job.phone, searchQuery)}</div>` : '';
      const vinHtml = job.region ? `<span class="vin">${job.region}</span>` : '';
      const mc = getModelColor(job.model);
      let partsHtml = '';
      if (job.parts && job.parts.length > 0) {
        const rows = job.parts.map((part,pi) => {
          const chk = isChecked(ji,pi) ? ' checked' : '';
          const memo = partMemos[stableMemoKey(ji, pi)] || '';
          const hasMemo = memo.length > 0;
          return `<div>
            <div class="part-row${chk}" id="p-${ji}-${pi}">
              <div class="cb-box" onclick="togglePart(${ji},${pi})">${CHECK_SVG}</div>
              <span class="part-label" onclick="togglePart(${ji},${pi})">🔩 ${part}</span>
              <button class="part-memo-btn${hasMemo?' has-memo':''}" id="pmb-${ji}-${pi}" onclick="togglePartMemo(${ji},${pi})" title="메모">📝</button>
            </div>
            <div class="part-memo-wrap${hasMemo?' always':''}" id="pmw-${ji}-${pi}">
              ${hasMemo
                ? `<div class="part-memo-text" id="pmt-${ji}-${pi}" onclick="editPartMemo(${ji},${pi})">↳ ${memo}</div>`
                : `<input class="part-memo-input" id="pmi-${ji}-${pi}" placeholder="발주 메모 입력..." value="${memo}" onblur="savePartMemo(${ji},${pi})" onkeydown="if(event.key==='Enter')this.blur()">`
              }
            </div>
          </div>`;
        }).join('');
        partsHtml = `<div class="parts-block"><div class="parts-block-label">발주 부품</div>${rows}</div>`;
      }
      card.innerHTML = `${badge}
        <div class="time-col">${job.time||''}${endStr}</div>
        <div class="job-body">
          <div class="job-top">
            <span class="car-model" style="background:${mc.bg};border-color:${mc.border};color:${mc.text}">${highlight(displayModel(job.model), searchQuery)||''}</span>
            <span class="plate">${highlight(job.plate, searchQuery)||''}</span>
            ${vinHtml}
          </div>
          <div class="job-title">${highlight(job.title, searchQuery)||''}</div>
          ${noteHtml}${phoneHtml}${partsHtml}
        </div>
        <div class="card-actions">
          <button class="btn-icon" onclick="openModal(${ji})">✏️</button>
          <button class="btn-icon btn-del" onclick="askDelete(${ji})">🗑️</button>
        </div>`;
      section.appendChild(card);
    });
    container.appendChild(section);
    if (di < dates.length-1) {
      const div = document.createElement('div'); div.className='section-divider'; container.appendChild(div);
    }
  });

  const active = JOBS.filter(j=>!j.done&&!j.cancelled).length;
  document.getElementById('totalCount').textContent = active;
  updateProgress();
  buildSummary();
  buildSidePanels();
}

function togglePartMemo(ji, pi) {
  const wrap = document.getElementById(`pmw-${ji}-${pi}`);
  if (!wrap) return;
  const memo = partMemos[stableMemoKey(ji, pi)] || '';
  if (memo) {
    // 메모 있으면 편집 모드로 전환
    editPartMemo(ji, pi);
  } else {
    // 메모 없으면 입력창 토글
    const isOpen = wrap.classList.toggle('open');
    if (isOpen) {
      const inp = document.getElementById(`pmi-${ji}-${pi}`);
      if (inp) setTimeout(() => inp.focus(), 50);
    }
  }
}
function savePartMemo(ji, pi) {
  const inp = document.getElementById(`pmi-${ji}-${pi}`);
  if (!inp) return;
  const val = inp.value.trim();
  if (val) {
    partMemos[stableMemoKey(ji, pi)] = val;
  } else {
    delete partMemos[stableMemoKey(ji, pi)];
  }
  savePartMemos();
  renderSchedule(); // 저장 후 재렌더 → 메모 있으면 always로 항상 표시
}
function editPartMemo(ji, pi) {

  const wrap = document.getElementById(`pmw-${ji}-${pi}`);

    if (inp) { inp.focus(); inp.select(); }

// ── 사이드바 패널들 ────────────────────────────────────────────────────
function buildSidePanels() {
  const now = getNow();
  const todayDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  function parseDate(str) {
    if (!str) return null;
    const [m,d] = str.split('/');
    return new Date(2026, parseInt(m)-1, parseInt(d));
  }
  // 장기 입고: endDate 있고 완료/취소 아닌 것, 입고 경과일 기준 내림차순
  const longStay = JOBS.filter(j => j.endDate && !j.cancelled && !j.done).map(j => {
    const start = parseDate(j.date);
    const end   = parseDate(j.endDate);
    const days  = start ? Math.floor((todayDate - start) / 86400000) : 0;
    return {...j, days, endDateObj: end};
  }).filter(j => j.days >= 0 && j.endDateObj && j.endDateObj >= todayDate)
    .sort((a,b) => b.days - a.days);

  document.getElementById('longCount').textContent = longStay.length + '건';
  const lList = document.getElementById('longList');
  if (longStay.length === 0) {
    lList.innerHTML = '<div style="padding:8px 4px;font-size:13px;color:var(--text-muted)">현재 장기 입고 없음</div>';
  } else {
    lList.innerHTML = longStay.map((j, idx) => {
      const mc  = getModelColor(j.model);
      const end = j.endDateObj;
      const dLeft = end ? Math.ceil((end - todayDate) / 86400000) : null;
      const dayCls = j.days >= 7 ? 'warn' : j.days >= 3 ? 'caution' : 'ok';
      const ddCls  = dLeft !== null ? (dLeft <= 1 ? 'warn' : dLeft <= 3 ? 'caution' : 'ok') : 'ok';
      const ddLabel = dLeft === null ? '' : dLeft > 0 ? `D-${dLeft} 출고예정` : dLeft === 0 ? 'D-Day 출고' : '출고일 경과';
      const phoneRow = j.phone ? `<div class="long-card-expand-row">📞 <b>연락처</b> ${j.phone}</div>` : '';
      const vinRow   = j.region? `<div class="long-card-expand-row">🔖 <b>차대번호</b> ${j.region}</div>` : '';
      const noteRow  = j.note  ? `<div class="long-card-expand-row">💬 <b>메모</b> ${j.note}</div>` : '';
      const partsRow = ''; // 발주부품 사이드바 미표시
      return `<div class="long-card" id="lc-${idx}" onclick="toggleLongCard(${idx})">
        <div class="long-card-top">
          <div style="display:flex;align-items:center;gap:6px;">
            <span class="long-card-model" style="background:${mc.bg};border-color:${mc.border};color:${mc.text}">${displayModel(j.model)||''}</span>
            <span class="long-card-plate">${j.plate||''}</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px;">
            <span class="long-card-days ${dayCls}">${j.days}일째</span>
            <span class="long-card-chevron">▼</span>
          </div>
        </div>
        <div class="long-card-title">${j.title||''}</div>
        <div class="long-card-dates">📅 ${j.date} → ${j.endDate}</div>
        ${ddLabel ? `<div class="long-card-dday ${ddCls}">⏱ ${ddLabel}</div>` : ''}
        <div class="long-card-expand" id="lce-${idx}">
          ${noteRow}${phoneRow}${vinRow}${partsRow}
        </div>
      </div>`;
    }).join('');
  }
}

async function mergeAndUpdate(newJobs) {
  function jobKey(j) { return (j.date||'')+'|'+(j.time||'')+'|'+(j.plate||'')+'|'+(j.model||''); }

  // Supabase에서 최신 데이터 먼저 가져옴 (다른 기기 수정사항 포함)
  let baseJobs = JOBS;
  let baseChecked = checkedState;
  let baseMemos = partMemos;
  try {
    const [sbJobs, sbChecked, sbMemos] = await Promise.all([
      sbGet('jungbi_jobs'),
      sbGet('jungbi_checked'),
      sbGet('jungbi_pmemo'),
    ]);
    if (sbJobs && sbJobs.length > 0) baseJobs = sbJobs;
    if (sbChecked) baseChecked = sbChecked;
    if (sbMemos) baseMemos = sbMemos;
  } catch(e) {}

  // 최신 Supabase 데이터 기준으로 체크/메모 반영
  checkedState = baseChecked;
  partMemos = baseMemos;
  try { localStorage.setItem(LS_CHECKED, JSON.stringify(checkedState)); } catch(e) {}
  try { localStorage.setItem(LS_PMEMO, JSON.stringify(partMemos)); } catch(e) {}

  // 새 ICS 기준으로 병합 (Supabase의 완료/취소/메모/차대번호/부품 유지)
  const oldMap = {};
  baseJobs.forEach(j => { oldMap[jobKey(j)] = j; });

  const merged = newJobs.map(nj => {
    const old = oldMap[jobKey(nj)];
    if (!old) return nj; // 신규 일정
    return {
      ...nj,                                                          // 새 ICS 내용 기준
      done:      old.done,                                            // 완료 상태 유지
      cancelled: old.cancelled,                                       // 취소 상태 유지
      note:      old.note !== undefined && old.note !== '' ? old.note : nj.note,     // 메모 유지
      region:    old.region !== undefined && old.region !== '' ? old.region : nj.region, // 차대번호 유지
      parts:     old.parts !== undefined ? old.parts : nj.parts,     // 부품 유지
    };
  });

  JOBS = merged;
  saveJobs();
  if (SB_READY) {
    sbSet('jungbi_checked', checkedState);
    sbSet('jungbi_pmemo', partMemos);
  }
  renderSchedule();
}

// ── ICS 텍스트 파서 (Python과 동일한 로직) ────────────────────────────
function parseICSText(text) {
  // line folding 처리 (CRLF + space/tab)
  text = text.split('\r\n ').join('').split('\r\n\t').join('');
  text = text.split('\n ').join('').split('\n\t').join('');
  const lines = text.split(/\r\n|\n|\r/);
  const events = [];
  let current = null;
  for (const line of lines) {
    const l = line.trim();
    if (l === 'BEGIN:VEVENT') { current = {}; }
    else if (l === 'END:VEVENT') { if (current) events.push(current); current = null; }
    else if (current && l.includes(':')) {
      const sep = l.indexOf(':');
      const key = l.slice(0, sep).split(';')[0].toUpperCase();
      if (!(key in current)) current[key] = l.slice(sep + 1);
    }
  }
  const seen = new Set();
  const jobs = [];
  for (const ev of events) {
    const summary = cleanText(ev['SUMMARY'] || '');
    if (!summary || summary.includes('청소 시간')) continue;
    const dedup = (ev['UID'] || '') + (ev['RECURRENCE-ID'] || '');
    if (seen.has(dedup)) continue;
    seen.add(dedup);
    const [dateStr, timeStr] = parseDtStr(ev['DTSTART'] || '');
    let [endDateStr] = parseDtStr(ev['DTEND'] || '');
    if (endDateStr === dateStr) endDateStr = '';
    if (!dateStr) continue;
    const cancelled = summary.includes('취소');
    const done = !!(ev['X-NAVER-COMPLETED']);
    const desc = cleanText(ev['DESCRIPTION'] || '');
    const { model, plate, title } = parseSummary(summary);
    const parts = extractParts(title);
    jobs.push({ date: dateStr, endDate: endDateStr, time: timeStr || '종일',
      model, plate, region: '', title, parts, phone: '', note: desc,
      done, cancelled });
  }
  jobs.sort((a, b) => sortKey(a) - sortKey(b));
  return jobs;
}
function cleanText(t) {
  return t.replace(/\\n/g, ' ').replace(/\\,/g, ',').replace(/\\;/g, ';').replace(/\r/g, '').trim();
}

function parseDtStr(s) {
  s = s.trim();
  if (s.includes('T')) {
    const y=s.slice(0,4), mo=s.slice(4,6), d=s.slice(6,8), h=s.slice(9,11), mi=s.slice(11,13);
    return [`${parseInt(mo)}/${parseInt(d)}`, `${h}:${mi}`];
  } else if (s.length >= 8) {
    const mo=s.slice(4,6), d=s.slice(6,8);
    return [`${parseInt(mo)}/${parseInt(d)}`, '종일'];
  }
  return ['', ''];
}

function parseSummary(summary) {
  let s = summary;
  // 전화번호 제거
  s = s.replace(/0\d{1,2}[-\s]?\d{3,4}[-\s]?\d{4}/g, '').trim();
  // 모델
  const modelM = s.match(/^([A-Z]\d+[a-z]*d?)/);
  const model = modelM ? modelM[1] : '';
  if (model) s = s.slice(model.length).replace(/^\./, '');
  // 번호판
  const plateM = s.match(/[\d가-힣]+[가-힣][\d]+|[가-힣]+\d+/);
  const plate = plateM ? plateM[0].trim() : '';
  if (plate) s = s.replace(plate, '');
  // 괄호 제거
  s = s.replace(/[(（][^)）\n]{1,15}[)）]/g, '').replace(/^[\s.,\-]+/, '').replace(/[\s.,\-]+$/, '').replace(/\s{2,}/g, ' ').trim();
  return { model, plate, title: s };
}

const PART_KEYWORDS = ['마운트세트','마운트 세트','엔진마운트','타이밍체인커버','타이밍 체인 커버','타이밍커버','워터펌프어셈블리','워터펌프 어셈블리','워터펌프','댐퍼풀리세트','댐퍼풀리 세트','댐퍼풀리','오일필터하우징','오일필터','오일팬','터보인테이크가스켓','터보 인테이크 가스켓','터보어셈블리','터보파이프','터보재생','벨트세트','환기파이프','로워암부싱세트','앞 부싱','앞부싱','부싱세트','볼조인트','허브베어링','쇼바마운트','인터쿨러파이프','플러그씰','브레이크액','브레이크 액','브레이크패드','브레이크 패드','도어록','휠센서','앞휠센서','윈드실드커버','에어필터','헤드개스킷','클러치','링크','부싱','오일압력제어밸브'];
const PART_BLACKLIST = ['엔진오일','엔진 오일','미션오일','미션 오일','DCT미션오일','DCT 미션오일','에어컨필터','에어컨 필터','배터리','앞패드','앞 패드','뒤패드','뒤 패드'];

function extractParts(title) {
  const found = [];
  const tl = title.toLowerCase();
  for (const kw of PART_KEYWORDS) {
    if (tl.includes(kw.toLowerCase())) {
      if (PART_BLACKLIST.some(bl => bl.toLowerCase().includes(kw.toLowerCase()) || kw.toLowerCase().includes(bl.toLowerCase()))) continue;
      if (!found.some(f => f.toLowerCase().includes(kw.toLowerCase()) || kw.toLowerCase().includes(f.toLowerCase()))) {
        found.push(kw);
      }
    }
  }
  return found;
}

function loadICSFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const raw = e.target.result;
    const jobs = parseICSText(raw);
    if (jobs.length === 0) {
      alert('일정을 찾을 수 없어요. ICS 파일을 확인해주세요.');
      return;
    }
    mergeAndUpdate(jobs);
    const now = getNow();
    const ts = now.getFullYear() + '.' + String(now.getMonth()+1).padStart(2,'0') + '.' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    try { localStorage.setItem('jungbi_last_updated', ts); } catch(e) {}
    if (SB_READY) sbSet('jungbi_last_updated', ts);
    showLastUpdated(ts);
    alert('✅ ' + jobs.length + '개 일정 갱신 완료!');
  };
  reader.readAsText(file, 'utf-8');
  input.value = '';
}

  currentFilter = date;

// ── Modal ─────────────────────────────────────────────────
function openModal(ji) {
  editingIndex = ji !== undefined ? ji : null;
  const job = ji !== undefined ? JOBS[ji] : null;
  document.getElementById('modalTitle').textContent = job ? '일정 수정' : '일정 추가';
  document.getElementById('f-date').value    = job ? job.date : '';
  document.getElementById('f-endDate').value = job ? (job.endDate||'') : '';
  document.getElementById('f-time').value    = job ? job.time : '';
  document.getElementById('f-model').value   = job ? job.model : '';
  document.getElementById('f-plate').value   = job ? job.plate : '';
  document.getElementById('f-region').value  = job ? job.region : '';
  document.getElementById('f-title').value   = job ? job.title : '';
  document.getElementById('f-phone').value   = job ? job.phone : '';
  document.getElementById('f-note').value    = job ? job.note : '';
  modalStatus = { done: job?job.done:false, cancel: job?job.cancelled:false };
  refreshStatusToggles();
  renderPartsEditor(job ? (job.parts||[]) : []);
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e) { if(e.target===document.getElementById('modalOverlay')) closeModal(); }

function renderPartsEditor(parts) {
  const editor = document.getElementById('partsEditor');
  editor.innerHTML = '';
  parts.forEach((p,i) => {
    const row = document.createElement('div'); row.className='parts-editor-item';
    row.innerHTML=`<input type="text" value="${p}" placeholder="부품명" id="part-field-${i}"><button class="btn-remove-part" onclick="removePartField(${i})">×</button>`;
    editor.appendChild(row);
  });
}
function addPartField() {
  const editor = document.getElementById('partsEditor');
  const idx = editor.children.length;
  const row = document.createElement('div'); row.className='parts-editor-item';
  row.innerHTML=`<input type="text" placeholder="부품명" id="part-field-${idx}"><button class="btn-remove-part" onclick="removePartField(${idx})">×</button>`;
  editor.appendChild(row);
  row.querySelector('input').focus();
}
function removePartField(i) {
  const editor = document.getElementById('partsEditor');
  const items = editor.querySelectorAll('.parts-editor-item');
  if(items[i]) items[i].remove();
  editor.querySelectorAll('.parts-editor-item').forEach((row,ni) => {
    row.querySelector('input').id = `part-field-${ni}`;
    row.querySelector('button').setAttribute('onclick',`removePartField(${ni})`);
  });
}
function getParts() {
  return Array.from(document.getElementById('partsEditor').querySelectorAll('input'))
    .map(inp=>inp.value.trim()).filter(v=>v);
}
function toggleStatus(type) {
  if(type==='done') { modalStatus.done = !modalStatus.done; if(modalStatus.done) modalStatus.cancel=false; }
  else { modalStatus.cancel = !modalStatus.cancel; if(modalStatus.cancel) modalStatus.done=false; }
  refreshStatusToggles();
}
function refreshStatusToggles() {
  document.getElementById('toggle-done').className = 'toggle-btn'+(modalStatus.done?' active-done':'');
  document.getElementById('toggle-cancel').className = 'toggle-btn'+(modalStatus.cancel?' active-cancel':'');
}
function saveJob() {
  const date = document.getElementById('f-date').value.trim();
  if(!date) { alert('날짜를 입력해주세요.'); return; }
  const job = {
    date, endDate:document.getElementById('f-endDate').value.trim(),
    time:document.getElementById('f-time').value.trim()||'종일',
    model:document.getElementById('f-model').value.trim(),
    plate:document.getElementById('f-plate').value.trim(),
    region:document.getElementById('f-region').value.trim(),
    title:document.getElementById('f-title').value.trim(),
    phone:document.getElementById('f-phone').value.trim(),
    note:document.getElementById('f-note').value.trim(),
    parts:getParts(), done:modalStatus.done, cancelled:modalStatus.cancel,
  };
  if(editingIndex!==null) JOBS[editingIndex]=job; else JOBS.push(job);
  saveJobs(); closeModal(); renderSchedule();
}

// ── Delete ────────────────────────────────────────────────
function askDelete(ji) {
  deletingIndex = ji;
  const job = JOBS[ji];
  document.getElementById('confirmMsg').textContent = `"${job.model} ${job.plate}" 일정을 삭제할까요?`;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('open'); deletingIndex=null; }
function confirmDelete() { if(deletingIndex===null) return; JOBS.splice(deletingIndex,1); saveJobs(); closeConfirm(); renderSchedule(); }

// ── Theme ─────────────────────────────────────────────────
async function manualRefresh() {
  const btn = document.getElementById('refreshBtn');
  if (btn) { btn.classList.add('spinning'); btn.disabled = true; }
  try {
    const [sbJobs, sbChecked, sbMemos] = await Promise.all([
      sbGet('jungbi_jobs'),
      sbGet('jungbi_checked'),
      sbGet('jungbi_pmemo'),
    ]);
    let changed = false;
    if (sbChecked && JSON.stringify(sbChecked) !== JSON.stringify(checkedState)) {
      checkedState = sbChecked;
      try { localStorage.setItem(LS_CHECKED, JSON.stringify(checkedState)); } catch(e) {}
      changed = true;
    }
    if (sbMemos && JSON.stringify(sbMemos) !== JSON.stringify(partMemos)) {
      partMemos = sbMemos;
      try { localStorage.setItem(LS_PMEMO, JSON.stringify(partMemos)); } catch(e) {}
      changed = true;
    }
    if (sbJobs) {
      function jobKey(j) { return (j.date||'')+'|'+(j.time||'')+'|'+(j.plate||'')+'|'+(j.model||''); }
      const sbMap = {};
      sbJobs.forEach(j => { sbMap[jobKey(j)] = j; });
      const merged = DEFAULT_JOBS.map(dj => {
        const sb = sbMap[jobKey(dj)];
        if (!sb) return dj;
        return { ...dj, done: sb.done, cancelled: sb.cancelled,
          note: sb.note !== undefined && sb.note !== '' ? sb.note : dj.note,
          region: sb.region !== undefined && sb.region !== '' ? sb.region : dj.region,
          parts: sb.parts !== undefined ? sb.parts : dj.parts };
      });
      if (JSON.stringify(merged) !== JSON.stringify(JOBS)) {
        JOBS = merged;
        try { localStorage.setItem(LS_JOBS, JSON.stringify(JOBS)); } catch(e) {}
        changed = true;
      }
    }
    if (changed) renderSchedule();
  } catch(e) {}
  finally {
    setTimeout(() => {
      if (btn) { btn.classList.remove('spinning'); btn.disabled = false; }
    }, 800);
  }
}

function toggleTheme() {
  const isLight = document.documentElement.classList.toggle('light');
  try{localStorage.setItem('jungbi_theme', isLight?'light':'dark');}catch(e){}
  document.getElementById('themeBtn').textContent = isLight ? '🌙' : '☀️';

// ── 비밀번호 보호 ────────────────────────────────────────────────────────
async function hashPw(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

const PW_HASH = '03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4'; // 1234

async function checkPw() {
  const val = document.getElementById('pwInput').value;
  const h = await hashPw(val);
  if (h === PW_HASH) {
    sessionStorage.setItem('jungbi_auth', '1');
    document.getElementById('pw-screen').style.display = 'none';
  } else {
    document.getElementById('pwError').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

// ── Supabase에서 데이터 불러오기 후 렌더 ────────────────────────────────
(async function initFromSupabase() {
  // 1. 일단 localStorage로 빠르게 첫 렌더
  renderSchedule();

  // 2. Supabase에서 최신 데이터 로드
  try {
    const [sbJobs, sbChecked, sbMemos] = await Promise.all([
      sbGet('jungbi_jobs'),
      sbGet('jungbi_checked'),
      sbGet('jungbi_pmemo'),
    ]);

    let changed = false;

    if (sbJobs) {
      // DEFAULT_JOBS 기준으로 고유키(날짜+시간+번호판+차종) 생성
      function jobKey(j) { return (j.date||'')+'|'+(j.time||'')+'|'+(j.plate||'')+'|'+(j.model||''); }

      // Supabase 저장 데이터를 키-맵으로 변환
      const sbMap = {};
      sbJobs.forEach(j => { sbMap[jobKey(j)] = j; });

      // DEFAULT_JOBS(새 ICS) 기준으로 병합:
      // - 작업내용/날짜/번호판 등 일정 정보 → 항상 새 ICS 기준
      // - 완료/취소 상태, 브라우저에서 수정한 메모 → Supabase에서 가져옴
      const merged = DEFAULT_JOBS.map(dj => {
        const sb = sbMap[jobKey(dj)];
        if (!sb) return dj; // 신규 일정은 그대로
        return {
          ...dj,           // 새 ICS 내용 기준 (title, phone 등)
          done:      sb.done,      // 완료 상태 유지
          cancelled: sb.cancelled, // 취소 상태 유지
          note:      sb.note !== undefined ? sb.note : dj.note, // 메모 유지
          region:    sb.region !== undefined && sb.region !== '' ? sb.region : dj.region, // 차대번호 유지
          // Supabase에 parts가 저장돼 있으면 무조건 우선 사용 (삭제/추가 모두 반영)
          parts:     sb.parts !== undefined ? sb.parts : dj.parts,
        };
      });

      JOBS = merged;
      try { localStorage.setItem(LS_JOBS, JSON.stringify(JOBS)); } catch(e) {}
      changed = true;
    }
    if (sbChecked && JSON.stringify(sbChecked) !== JSON.stringify(checkedState)) {
      checkedState = sbChecked;
      try { localStorage.setItem(LS_CHECKED, JSON.stringify(checkedState)); } catch(e) {}
      changed = true;
    }
    if (sbMemos && JSON.stringify(sbMemos) !== JSON.stringify(partMemos)) {
      partMemos = sbMemos;
      try { localStorage.setItem(LS_PMEMO, JSON.stringify(partMemos)); } catch(e) {}
      changed = true;
    }

    SB_READY = true;
    if (changed) renderSchedule();
    console.log('✅ Supabase 데이터 로드 완료');
  } catch(e) {
    SB_READY = true; // 실패해도 저장은 시도
    console.warn('Supabase 로드 실패, localStorage 사용:', e);
  }
})();
